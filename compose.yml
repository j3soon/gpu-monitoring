services:
  # ── DCGM Exporter ─────────────────────────────────────────────────────────
  # Reads GPU metrics via NVIDIA's Data Center GPU Manager (DCGM) library and
  # exposes them as Prometheus-format text on :9400/metrics.
  # Ref: https://github.com/NVIDIA/dcgm-exporter
  #
  # The `deploy.resources.reservations.devices` block tells Docker Compose to
  # pass all GPU devices into this container using the NVIDIA runtime.
  #
  # Note: `--cap-add SYS_ADMIN` is not included here for now.
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
    command:
      # -c sets the collection interval in milliseconds (default: 30000).
      # Set to 15000 to match Prometheus scrape_interval.
      # Ref: https://docs.nvidia.com/datacenter/dcgm/latest/gpu-telemetry/dcgm-exporter.html
      - -c
      - "15000"
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Node Exporter ──────────────────────────────────────────────────────────
  # Exposes host OS metrics (CPU, memory, disk, network, filesystem).
  # Ref: https://github.com/prometheus/node_exporter
  #
  # network_mode: host — the container shares the host network stack directly,
  #   so node-exporter sees real interface names (eth0, lo, ...) and their stats
  #   rather than the container's virtual eth0. Also means no port mapping needed;
  #   :9100 is bound on the host directly.
  #
  # pid: host — shares the host PID namespace, enabling per-process collectors
  #   (e.g. process_open_fds) to see all host processes, not just container ones.
  #
  # /:/host:ro,rslave — mounts the entire host root read-only.
  #   rslave means mount propagation is one-way: new mounts on the host are
  #   visible inside the container, but not vice versa. --path.rootfs=/host
  #   tells the binary to treat /host as the filesystem root when collecting
  #   disk metrics and reading /proc, /sys, etc.
  #
  # Note: `--cap-add=SYS_TIME` is not included here for now.
  node-exporter:
    image: prom/node-exporter:v1.11.0
    command:
      - --path.rootfs=/host
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────
  # Scrapes /metrics from all exporters on a schedule and stores them as
  # time-series in its local TSDB (time-series database).
  # Ref: https://prometheus.io/docs/prometheus/latest/installation/
  #
  # Default paths in the image:
  #   config  → /etc/prometheus/prometheus.yml
  #   data    → /prometheus
  # ./prometheus/data is a bind mount so TSDB blocks are visible on disk.
  prometheus:
    image: prom/prometheus:v3.11.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/data:/prometheus
    # node-exporter uses network_mode: host, which takes it off the Docker bridge
    # entirely — Docker DNS cannot resolve it by service name from here.
    # extra_hosts injects the host's bridge gateway IP as "host.docker.internal",
    # giving Prometheus a routable address to reach port 9100 on the host network.
    # network_mode: host and networks: are mutually exclusive in Docker, so a
    # shared custom network is not an option.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────
  # Dashboard UI. Datasource is auto-provisioned from config at startup —
  # no manual clicks needed.
  # Ref: https://grafana.com/docs/grafana/latest/administration/provisioning/
  #
  # Grafana runs as UID 472 — grafana/data must be owned by that UID.
  # Run scripts/setup.sh before first start to fix permissions.
  grafana:
    image: grafana/grafana:12.4.2
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/data:/var/lib/grafana
    restart: unless-stopped
