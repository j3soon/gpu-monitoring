# Prometheus scrape configuration
# Ref: https://prometheus.io/docs/prometheus/latest/configuration/configuration/
#
# How scraping works:
#   Prometheus is a *pull* system — it calls each target's /metrics endpoint on
#   a schedule and stores the result as time-series data.  Each scrape job
#   defines *what* to scrape (static_configs.targets) and *how often*
#   (scrape_interval, overriding the global default).
#
# Target addresses: dcgm-exporter resolves via Docker bridge DNS.
# node-exporter runs with network_mode: host — reached via host.docker.internal
# (the Docker bridge gateway IP, injected via extra_hosts in compose.yml).

# Configures data retention settings for TSDB.
storage:
  tsdb:
    retention:
      # How long to retain samples in storage. If neither this option nor the size option
      # is set, the retention time defaults to 15d. Setting this to 0 disables time-based retention.
      # This option takes precedence over the deprecated command-line flag --storage.tsdb.retention.time.
      time: 0  # 0 disables time-based retention — data is kept forever (default: 15d)

global:
  # Following https://github.com/prometheus/prometheus/blob/main/documentation/examples/prometheus.yml
  # DCGM Exporter collection interval is also set to 15s in compose.yml to match.
  scrape_interval: 15s      # default poll frequency for all jobs
  evaluation_interval: 15s  # how often rules (alerts) are evaluated

scrape_configs:
  # ── Prometheus self-scrape ─────────────────────────────────────────────────
  # Prometheus exposes its own operational metrics (scrape durations, rule eval
  # times, TSDB stats, etc.) on its own /metrics endpoint.  Scraping itself
  # lets you monitor the health of the monitoring system.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── DCGM Exporter ─────────────────────────────────────────────────────────
  # dcgm-exporter is on the Docker bridge — reachable by service name via Docker DNS.
  - job_name: dcgm-exporter
    static_configs:
      - targets: ["dcgm-exporter:9400"]

  # ── Node Exporter ─────────────────────────────────────────────────────────
  # node-exporter runs with network_mode: host — not on the Docker bridge.
  # host.docker.internal resolves to the host's bridge gateway IP (see extra_hosts
  # in compose.yml), routing traffic to port 9100 on the host network.
  - job_name: node-exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]

  # ── Blackbox Exporter — HTTP probes ───────────────────────────────────────
  # Ref: https://prometheus.io/docs/guides/multi-target-exporter/#querying-multi-target-exporters-with-prometheus
  # Blackbox works differently: Prometheus tells it *what* to probe via the
  # `target` query parameter. Relabeling rewrites __address__ so Prometheus
  # calls blackbox-exporter:9115/probe?target=<url>&module=http_2xx, then
  # sets the `instance` label to the probed URL for readable dashboards.
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://github.com                     # git push/pull (HTTPS)
          - https://objects.githubusercontent.com  # git pack files + release binary downloads
          - https://google.com                     # general internet reachability
          - https://cloudflare.com                 # general internet reachability
          - http://archive.ubuntu.com              # apt packages
          - http://tw.archive.ubuntu.com           # apt packages (Taiwan mirror)
          - http://security.ubuntu.com             # apt security updates
          - https://youtube.com                    # video streaming
          - https://arxiv.org                      # research papers
          - https://facebook.com                   # social media
          - https://microsoft.com                  # general Microsoft reachability
          - https://onedrive.live.com              # OneDrive web + sync client
          - https://storage.live.com               # OneDrive file blob storage (upload/download bottleneck)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ── Blackbox Exporter — HTTP probes (any status) ────────────────────────
  # For endpoints that return non-2xx on plain GET but still prove reachability.
  # probe_success=1 means the host responded; status code is not checked.
  - job_name: blackbox-http-any
    metrics_path: /probe
    params:
      module: [http_get_any]
    static_configs:
      - targets:
          - https://registry-1.docker.io                  # Docker Hub registry (manifest + layer metadata)
          - https://production.cloudflare.docker.com      # Cloudflare CDN serving image layer blobs
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ── Blackbox Exporter — ICMP probes ──────────────────────────────────────
  # Pings DNS resolvers and well-known hosts to detect general network issues.
  - job_name: blackbox-icmp
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          # DNS resolvers — fast, reliable ICMP responders worldwide
          - 8.8.8.8      # Google DNS primary
          - 8.8.4.4      # Google DNS secondary
          - 1.1.1.1      # Cloudflare DNS primary
          - 1.0.0.1      # Cloudflare DNS secondary
          # Common infra
          - github.com
          - google.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
