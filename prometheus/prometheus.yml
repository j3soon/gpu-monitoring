# Prometheus scrape configuration
# Ref: https://prometheus.io/docs/prometheus/latest/configuration/configuration/
#
# How scraping works:
#   Prometheus is a *pull* system — it calls each target's /metrics endpoint on
#   a schedule and stores the result as time-series data.  Each scrape job
#   defines *what* to scrape (static_configs.targets) and *how often*
#   (scrape_interval, overriding the global default).
#
# Target addresses: dcgm-exporter resolves via Docker bridge DNS.
# node-exporter runs with network_mode: host — reached via host.docker.internal
# (the Docker bridge gateway IP, injected via extra_hosts in compose.yml).

# Configures data retention settings for TSDB.
storage:
  tsdb:
    retention:
      # How long to retain samples in storage. If neither this option nor the size option
      # is set, the retention time defaults to 15d. Setting this to 0 disables time-based retention.
      # This option takes precedence over the deprecated command-line flag --storage.tsdb.retention.time.
      time: 0  # 0 disables time-based retention — data is kept forever (default: 15d)

global:
  # Following https://github.com/prometheus/prometheus/blob/main/documentation/examples/prometheus.yml
  # DCGM Exporter collection interval is also set to 15s in compose.yml to match.
  scrape_interval: 15s      # default poll frequency for all jobs
  evaluation_interval: 15s  # how often rules (alerts) are evaluated

scrape_configs:
  # ── Prometheus self-scrape ─────────────────────────────────────────────────
  # Prometheus exposes its own operational metrics (scrape durations, rule eval
  # times, TSDB stats, etc.) on its own /metrics endpoint.  Scraping itself
  # lets you monitor the health of the monitoring system.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── DCGM Exporter ─────────────────────────────────────────────────────────
  # dcgm-exporter is on the Docker bridge — reachable by service name via Docker DNS.
  - job_name: dcgm-exporter
    static_configs:
      - targets: ["dcgm-exporter:9400"]

  # ── Node Exporter ─────────────────────────────────────────────────────────
  # node-exporter runs with network_mode: host — not on the Docker bridge.
  # host.docker.internal resolves to the host's bridge gateway IP (see extra_hosts
  # in compose.yml), routing traffic to port 9100 on the host network.
  - job_name: node-exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]
